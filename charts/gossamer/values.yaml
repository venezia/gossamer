image:
  repository: ghcr.io/venezia/gossamer
  tag: latest
  pullPolicy: IfNotPresent

schedule: "0 3 * * 1"

# Source TLS secret to push to targets
tlsSecret:
  # Fetch from K8s secret at runtime (requires RBAC)
  fetchFromCluster: true
  namespace: istio-ingress
  name: quacks-org-tls

# Targets to push certificates to
targets: []
# - host: nas1.example.com
#   type: truenas
#   tokenEnv: TRUENAS_NAS1_TOKEN
# - host: nas1-ipmi.example.com
#   type: ipmi
#   usernameEnv: IPMI_USERNAME
#   passwordEnv: IPMI_PASSWORD

# Credentials — reference existing secrets or create them
credentials:
  # Existing secret containing TrueNAS API tokens (keys = tokenEnv values from targets)
  truenasSecret: ""
  # Existing secret containing IPMI credentials (keys: username, password)
  ipmiSecret: ""
  # Or create secrets inline (will be created as K8s Secrets)
  truenasTokens: {}
  #   TRUENAS_NAS1_TOKEN: "your-api-token"
  ipmiCredentials: {}
  #   username: "admin"
  #   password: "yourpassword"

serviceAccount:
  create: true
  name: gossamer

rbac:
  create: true

cronjob:
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  backoffLimit: 1
  activeDeadlineSeconds: 900

nodeSelector: {}
tolerations: []
