{{- if and .Values.rbac.create .Values.tlsSecret.fetchFromCluster }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gossamer.fullname" . }}-read-tls
  namespace: {{ .Values.tlsSecret.namespace }}
  labels:
    {{- include "gossamer.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["secrets"]
  resourceNames: [{{ .Values.tlsSecret.name | quote }}]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "gossamer.fullname" . }}-read-tls
  namespace: {{ .Values.tlsSecret.namespace }}
  labels:
    {{- include "gossamer.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ include "gossamer.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "gossamer.fullname" . }}-read-tls
  apiGroup: rbac.authorization.k8s.io
{{- end }}
