name: CI

on:
  push:
    branches: [main]

jobs:
  commitlint:
    runs-on: arc-runner-gossamer
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-node@v4
      with:
        node-version: "24"
    - run: npm install -g @commitlint/cli @commitlint/config-conventional
    - name: Lint latest commit
      run: commitlint --from HEAD~1

  helm-lint:
    runs-on: arc-runner-gossamer
    steps:
    - uses: actions/checkout@v4
    - name: Lint Helm chart
      run: helm lint charts/gossamer

  release:
    needs: [commitlint, helm-lint]
    runs-on: arc-runner-gossamer
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-node@v4
      with:
        node-version: "24"
    - name: Install semantic-release
      run: npm install -g semantic-release @semantic-release/github @semantic-release/commit-analyzer @semantic-release/release-notes-generator conventional-changelog-conventionalcommits
    - name: Run semantic-release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: semantic-release
