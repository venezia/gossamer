name: CI

on:
  push:
    branches: [main]

jobs:
  commitlint:
    runs-on: arc-runner-gossamer
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-node@v4
      with:
        node-version: "24"
    - run: npm install -g @commitlint/cli @commitlint/config-conventional
    - name: Lint latest commit
      run: commitlint --from HEAD~1

  helm-lint:
    runs-on: arc-runner-gossamer
    steps:
    - uses: actions/checkout@v4
    - uses: azure/setup-helm@v4
    - name: Lint Helm chart
      run: helm lint charts/gossamer

  publish:
    needs: [commitlint, helm-lint]
    runs-on: arc-runner-gossamer
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-node@v4
      with:
        node-version: "24"
    - name: Install semantic-release
      run: >
        npm install -g
        semantic-release
        @semantic-release/github
        @semantic-release/commit-analyzer
        @semantic-release/release-notes-generator
        conventional-changelog-conventionalcommits
    - name: Record current tag
      id: pre
      run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo none)" >> "$GITHUB_OUTPUT"
    - name: Run semantic-release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: semantic-release
    - name: Check for new release
      id: post
      run: |
        NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo none)
        echo "tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
        if [ "$NEW_TAG" != "${{ steps.pre.outputs.tag }}" ] && [ "$NEW_TAG" != "none" ]; then
          echo "released=true" >> "$GITHUB_OUTPUT"
        else
          echo "released=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Update release with git-cliff notes
      if: steps.post.outputs.released == 'true'
      uses: orhun/git-cliff-action@v4
      with:
        config: cliff.toml
        args: --current --strip header
      env:
        OUTPUT: RELEASE_NOTES.md
    - name: Update GitHub Release body
      if: steps.post.outputs.released == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.post.outputs.tag }}
        body_path: RELEASE_NOTES.md
