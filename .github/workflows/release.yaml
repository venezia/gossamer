name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push container image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    - name: Push Helm chart to OCI registry
      run: |
        helm package charts/gossamer --version ${{ steps.version.outputs.version }} --app-version ${{ steps.version.outputs.version }}
        helm push gossamer-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

    - name: Generate changelog with git-cliff
      uses: orhun/git-cliff-action@v4
      with:
        config: cliff.toml
        args: --current --strip header
      env:
        OUTPUT: RELEASE_NOTES.md

    - name: Update GitHub Release notes
      uses: softprops/action-gh-release@v2
      with:
        body_path: RELEASE_NOTES.md
