name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

    - name: Build and push container image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

    - name: Push Helm chart to OCI registry
      run: |
        helm package charts/gossamer --version ${{ steps.version.outputs.version }} --app-version ${{ steps.version.outputs.version }}
        helm push gossamer-${{ steps.version.outputs.version }}.tgz oci://${{ env.REGISTRY }}/${{ github.repository_owner }}

    - name: Generate changelog
      run: |
        pip install git-cliff || pip3 install git-cliff || true
        git-cliff --current --strip header > RELEASE_NOTES.md 2>/dev/null || echo "See commits for changes." > RELEASE_NOTES.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        body_path: RELEASE_NOTES.md
